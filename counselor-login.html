<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Counselor Login</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
overflow:hidden;
}

/* VIDEO BACKGROUND */

video{
position:fixed;
right:0;
bottom:0;
min-width:100%;
min-height:100%;
object-fit:cover;
z-index:-1;
}

/* LOGIN CONTAINER */

.login-container{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* LOGIN BOX */

.login-box{
width:450px;
padding:50px;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(15px);
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
text-align:center;
color:white;
}

.login-box h2{
margin-bottom:25px;
font-size:32px;
}

.login-box input{
width:100%;
padding:14px;
margin:12px 0;
border:none;
border-radius:8px;
font-size:16px;
}

.login-box button{
width:100%;
padding:14px;
background:#8b5cf6;
border:none;
color:white;
font-size:18px;
border-radius:8px;
cursor:pointer;
}

.login-box button:hover{
background:#6d28d9;
}

.back-btn{
margin-top:15px;
background:#444;
}

</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->

<video autoplay muted loop>
<source src="image/login illustration.mp4" type="video/mp4">
</video>

<div class="login-container">

<div class="login-box">

<h2>Counselor Login</h2>

<input type="text" id="username" placeholder="Counselor Username">

<input type="password" id="password" placeholder="Password">

<button onclick="loginCounselor()">Login</button>

<button class="back-btn" onclick="goHome()">
Back to Home
</button>

</div>

</div>

<script>

function loginCounselor(){

const username=
document.getElementById("username").value;

const password=
document.getElementById("password").value;

/* SIMPLE DEMO LOGIN */

if(username==="CSL-001" && password==="counsel123"){

localStorage.setItem("counselorLoggedIn",true);

window.location.href="counselor-portal.html";

}else{

alert("Invalid Counselor Credentials");

}

}

function goHome(){
window.location.href="home.html";
}

</script>

</body>
</html>
